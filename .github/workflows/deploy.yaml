name: Deploy Quartz site to GitHub Pages
 
on:
  push:
    branches:
      - v4
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: "pages"
  cancel-in-progress: false
 
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git info
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build
      # Quartz 输出 path/to/page.html；GitHub Pages 访问 /path/to/page/ 时只认 path/to/page/index.html，否则会 404。
      # 本地 dev server 往往会正确解析单文件路径，故仅线上表现为 404。
      - name: Folder-style URLs for GitHub Pages trailing slash
        run: |
          for page in hobby/goods tools/data-engineer-tools; do
            if [ -f "public/${page}.html" ]; then
              mkdir -p "public/${page}"
              cp "public/${page}.html" "public/${page}/index.html"
            fi
          done
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
 
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
