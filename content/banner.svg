<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">

<style>
.line {
  fill: none;
  stroke: #333;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
}
</style>

<!-- ground -->
<path class="line" d="M50 420 Q400 410 750 420" />

<!-- tree trunk -->
<path class="line" d="M200 420 L210 320 L230 320 L240 420" />

<!-- tree canopy -->
<path class="line" d="M170 320 
Q150 280 200 260 
Q180 220 230 210
Q280 220 270 260
Q310 280 290 320
Z"/>

<!-- small branch -->
<path class="line" d="M210 340 Q190 330 185 310" />

<!-- northern house base -->
<rect x="420" y="320" width="200" height="100" class="line"/>

<!-- roof -->
<path class="line" d="M400 320 L520 240 L640 320" />

<!-- roof edge -->
<path class="line" d="M410 320 Q520 300 630 320" />

<!-- door -->
<rect x="500" y="350" width="40" height="70" class="line"/>

<!-- windows -->
<rect x="440" y="350" width="40" height="40" class="line"/>
<rect x="580" y="350" width="40" height="40" class="line"/>

<!-- chimney -->
<rect x="560" y="260" width="20" height="40" class="line"/>

</svg>