<svg viewBox="0 0 400 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <style>
      /* Base styling for the stroke */
      .xf-path {
        fill: none;
        stroke: currentColor;
        stroke-width: 18;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
  
      /* Animation setup */
      .xf-main {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        animation: draw 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
  
      .xf-cross {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        /* The cross animates right as the main body finishes */
        animation: draw 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        animation-delay: 1.3s; 
      }
  
      @keyframes draw {
        100% {
          stroke-dashoffset: 0;
        }
      }
    </style>
  
    <g class="xf-path">
      <path class="xf-main" pathLength="1" d="
        M 100, 160
        C 120, 200 140, 240 170, 240
        C 210, 240 260, 100 270, 50
        C 275, 20 255, 10 245, 40
        C 225, 90 180, 260 170, 320
        C 160, 370 210, 370 220, 320
        C 230, 260 250, 220 300, 220" 
      />
  
      <path class="xf-cross" pathLength="1" d="
        M 100, 240
        C 120, 240 150, 160 170, 160" 
      />
    </g>
  </svg>
